<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ออฟไลน์ — HiSafe-CON WorkSpace</title>
<style>
  body { font-family: 'Sarabun', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f8fafc; color: #374151; }
  .card { background: #fff; border-radius: 16px; padding: 40px 32px; text-align: center; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 20px; font-weight: 600; color: #111827; margin-bottom: 8px; }
  p { font-size: 14px; color: #6B7280; line-height: 1.6; margin-bottom: 20px; }
  button { background: #1e3a8a; color: #fff; border: none; border-radius: 10px; padding: 10px 24px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
  button:hover { background: #1e40af; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>ไม่มีการเชื่อมต่ออินเทอร์เน็ต</h1>
  <p>กรุณาตรวจสอบการเชื่อมต่อเน็ตของคุณ แล้วลองใหม่อีกครั้ง</p>
  <button onclick="window.location.reload()">ลองใหม่</button>
</div>
</body>
</html>
